<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한양대 비건 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f7f5f0;
      color: #1a1a1a;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8e4dc;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #1a1a1a;
    }

    header p {
      font-size: 13px;
      color: #888;
      margin-top: 2px;
    }

    .logo {
      width: 36px; height: 36px;
      background: #1D9E75;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: #555;
    }

    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-full    { background: #1D9E75; }
    .dot-partial { background: #BA7517; }
    .dot-friendly{ background: #378ADD; }

    #map {
      width: 100%;
      height: 440px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #e0dbd0;
    }

    #info-panel {
      margin-top: 12px;
      background: #fff;
      border: 1px solid #e8e4dc;
      border-radius: 14px;
      padding: 16px 20px;
      min-height: 80px;
    }

    .info-placeholder {
      font-size: 14px;
      color: #aaa;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 48px;
    }

    .info-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .info-tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .tag-full     { background: #E1F5EE; color: #0F6E56; }
    .tag-partial  { background: #FAEEDA; color: #854F0B; }
    .tag-friendly { background: #E6F1FB; color: #185FA5; }

    .info-row {
      font-size: 13px;
      color: #666;
      margin-top: 5px;
      line-height: 1.6;
    }

    .info-note {
      margin-top: 8px;
      font-size: 13px;
      color: #333;
      background: #f7f5f0;
      border-left: 3px solid #1D9E75;
      padding: 8px 12px;
      border-radius: 0 8px 8px 0;
    }

    footer {
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🌱</div>
  <div>
    <h1>한양대 비건 지도</h1>
    <p>왕십리 · 한양대 일대 비건 식당 모음</p>
  </div>
</header>

<div class="container">

  <div class="legend">
    <div class="legend-item"><div class="dot dot-full"></div> 비건 메뉴 있음</div>
    <div class="legend-item"><div class="dot dot-partial"></div> 요청 시 비건 가능</div>
    <div class="legend-item"><div class="dot dot-friendly"></div> 비건 가능</div>
  </div>

  <div id="map"></div>
  <div id="info-panel">
    <div class="info-placeholder">지도의 마커를 클릭하면 식당 정보가 표시됩니다</div>
  </div>

</div>

<footer>
  데이터 오류나 제보는 인스타그램 @hyu._.hanpuri로 연락 주세요.
</footer>

<script>
/* =====================================================
   🌱 식당 데이터 — 여기만 수정하면 됩니다!
   
   type 값:
     "full"     → 완전 비건 메뉴 있음  (초록 마커)
     "partial"  → 재료 수정 시 비건 가능 (주황 마커)
     "friendly" → 비건 친화적          (파랑 마커)
   
   lat, lng:
     구글 지도에서 원하는 위치 우클릭
     → "이 장소에 대하여" 클릭
     → 상단에 숫자 두 개가 위도(lat), 경도(lng)입니다.
===================================================== */
const restaurants = [
  {
    name: "뺑드미 제빵소",
    type: "full",
    lat: 37.5611, lng: 127.0407, 
    address: "성동구 마조로9길 5",
    menu: "깜빠뉴, 무화과 깜빠뉴",
    hours: "9:00 – 20:00",
    note: "빵 비닐 봉지에 담아 주시니 용기 내보기!"
  },
  {
    name: "써브웨이 한양대점",
    type: "full",
    lat: 37.5588, lng: 127.0406,
    address: "성동구 마조로 11",
    menu: "베지, 웨지 포테이토, 샐러드",
    hours: "08:30 – 22:30",
    note: "빵은 화이트, 하티 이탈리안, 위트 가능"
  },
  {
    name: "슬로우캘리 한양대점",
    type: "full",
    lat: 37.5590, lng: 127.0410,
    address: "성동구 마조로 22",
    menu: "오리엔탈 두부 포케, 트러플 버섯 포케, 스파이시 토마토 야채 스프",
    hours: "11:00 – 20:30 (일요일 휴무)",
    note: "15:00 – 17:00 브레이크 타임"
  },
  {
    name: "샐러디 한양대점",
    type: "full",
    lat: 37.5597, lng: 127.0412,
    address: "성동구 마조로 24",
    menu: "노릇 두부 단호박",
    hours: "10:00 – 23:00",
    note: "소스는 발사믹, 레몬, 레드와인비니거 가능"
  },
  {
    name: "베네토",
    type: "partial",
    lat: 37.5584, lng: 127.0396,
    address: "성동구 마조로3길 7–1",
    menu: "알리오 올리오, 오븐으로 구운 감자스틱",
    hours: "11:00 – 23:00 (일요일 휴무)",
    note: "파스타 주문 시 치즈, 베이컨 빼달라고 요청하기"
  },
  {
    name: "동래파전",
    type: "friendly",
    lat: 37.5597, lng: 127.0402,
    address: "성동구 마조로3가길 30",
    menu: "감자전, 두부김치",
    hours: "16:00 – 03:00",
    note: "단체 회식에 용이함"
  },
  {
    name: "한골향 마라탕",
    type: "partial",
    lat: 37.5602, lng: 127.0415,
    address: "성동구 마조로 30 2층",
    menu: "마라탕",
    hours: "10:00 – 23:00",
    note: "맹물로 조리 요청 (약간 밍밍)"
  },
  {
    name: "파머스포케 한양대점",
    type: "full",
    lat: 37.5600, lng: 127.0408,
    address: "성동구 마조로 25",
    menu: "파머스비건 포케",
    hours: "10:00 – 20:00",
    note: "숯불고기 포케 (PLant–based) 주문 시 날치알 제외 요청"
  },
  {
    name: "아다나케밥 한양대2호점",
    type: "partial",
    lat: 37.5594, lng: 127.0408,
    address: "성동구 마조로 17",
    menu: "팔라펠 랩, 박스, 라이스 플레이트",
    hours: "unknown",
    note: "할랄 음식점, 주문 시 하얀 소스 제외 요청"
  }
];
/* ===================================================== */

const typeColor = { full: "#1D9E75", partial: "#BA7517", friendly: "#378ADD" };
const typeLabel = { full: "완전 비건", partial: "요청 시 비건", friendly: "비건 친화적" };
const tagClass  = { full: "tag-full", partial: "tag-partial", friendly: "tag-friendly" };

const map = L.map('map', {
  center: [37.5596, 127.0407],
  zoom: 16
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19
}).addTo(map);

function makeIcon(type) {
  const color = typeColor[type];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.268 0 0 6.268 0 14c0 9.333 14 22 14 22S28 23.333 28 14C28 6.268 21.732 0 14 0z"
      fill="${color}" stroke="white" stroke-width="2"/>
    <circle cx="14" cy="14" r="5" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 36],
    iconAnchor: [14, 36]
  });
}

function showInfo(r) {
  document.getElementById('info-panel').innerHTML = `
    <div class="info-name">${r.name}</div>
    <span class="info-tag ${tagClass[r.type]}">${typeLabel[r.type]}</span>
    <div class="info-row">📍 ${r.address}</div>
    <div class="info-row">🕐 ${r.hours}</div>
    <div class="info-row">🍽 ${r.menu}</div>
    <div class="info-note">💬 ${r.note}</div>
  `;
}

restaurants.forEach(r => {
  const marker = L.marker([r.lat, r.lng], { icon: makeIcon(r.type) }).addTo(map);
  marker.on('click', () => showInfo(r));
});
</script>

</body>
</html>
